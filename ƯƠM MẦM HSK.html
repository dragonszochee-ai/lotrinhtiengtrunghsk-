<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Chủ Đề - 50 Mẫu Câu Giao Tiếp Tiếng Trung</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-red-50 via-orange-50 to-yellow-50 min-h-screen p-4">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
const{useState}=React;const App=()=>{const[selectedTopic,setSelectedTopic]=useState(null);const[showTips,setShowTips]=useState(true);const topics=[{id:1,title:"Chào hỏi & Giới thiệu",emoji:"👋",color:"from-blue-400 to-cyan-500",tips:"Chào hỏi (问好) → Giới thiệu tên (介绍) → Hỏi tên (询问)",phrases:[{chinese:"你好！",pinyin:"Nǐ hǎo!",vi:"Xin chào!"},{chinese:"我叫...",pinyin:"Wǒ jiào...",vi:"Tôi tên là..."},{chinese:"你叫什么名字？",pinyin:"Nǐ jiào shénme míngzi?",vi:"Bạn tên là gì?"}]},{id:2,title:"Cảm ơn & Xin lỗi",emoji:"🙏",color:"from-pink-400 to-rose-500",tips:"Luôn dùng 谢谢 khi được giúp đỡ, 对不起 khi xin lỗi",phrases:[{chinese:"谢谢！",pinyin:"Xièxie!",vi:"Cảm ơn!"},{chinese:"不客气！",pinyin:"Bú kèqi!",vi:"Không khách khí!"},{chinese:"对不起。",pinyin:"Duìbuqǐ.",vi:"Xin lỗi."}]},{id:3,title:"Nhà hàng & Đặt món",emoji:"🍽️",color:"from-orange-400 to-red-500",tips:"Gọi phục vụ (服务员) → Xem menu → Đặt món",phrases:[{chinese:"服务员！",pinyin:"Fúwùyuán!",vi:"Phục vụ!"},{chinese:"我要点菜。",pinyin:"Wǒ yào diǎncài.",vi:"Tôi muốn gọi món."},{chinese:"买单！",pinyin:"Mǎidān!",vi:"Tính tiền!"}]},{id:4,title:"Mua sắm",emoji:"🛍️",color:"from-purple-400 to-pink-500",tips:"Hỏi giá (多少钱) → Mặc cả → Mua",phrases:[{chinese:"这个多少钱？",pinyin:"Zhège duōshao qián?",vi:"Cái này giá bao nhiêu?"},{chinese:"太贵了！",pinyin:"Tài guì le!",vi:"Đắt quá!"},{chinese:"我买了！",pinyin:"Wǒ mǎi le!",vi:"Tôi mua!"}]},{id:5,title:"Hỏi đường",emoji:"🗺️",color:"from-green-400 to-emerald-500",tips:"Xin lỗi để hỏi → Hỏi địa điểm → Nghe chỉ đường",phrases:[{chinese:"请问，...在哪里？",pinyin:"Qǐngwèn, ...zài nǎlǐ?",vi:"Xin hỏi, ... ở đâu?"},{chinese:"怎么去...？",pinyin:"Zěnme qù...?",vi:"Làm sao đến...?"},{chinese:"直走。",pinyin:"Zhí zǒu.",vi:"Đi thẳng."}]},{id:6,title:"Khách sạn",emoji:"🏨",color:"from-indigo-400 to-blue-500",tips:"Check-in → Hỏi về phòng → Check-out",phrases:[{chinese:"我要办理入住。",pinyin:"Wǒ yào bànlǐ rùzhù.",vi:"Tôi muốn check-in."},{chinese:"WiFi密码是什么？",pinyin:"WiFi mìmǎ shì shénme?",vi:"Mật khẩu WiFi là gì?"},{chinese:"我要退房。",pinyin:"Wǒ yào tuìfáng.",vi:"Tôi muốn trả phòng."}]},{id:7,title:"Sân bay",emoji:"✈️",color:"from-sky-400 to-blue-500",tips:"Check-in → An ninh → Lên máy bay",phrases:[{chinese:"值机在哪里？",pinyin:"Zhíjī zài nǎlǐ?",vi:"Check-in ở đâu?"},{chinese:"登机口在哪里？",pinyin:"Dēngjīkǒu zài nǎlǐ?",vi:"Cổng lên máy bay ở đâu?"},{chinese:"我的行李丢了。",pinyin:"Wǒ de xínglǐ diū le.",vi:"Hành lý của tôi bị mất."}]},{id:8,title:"Taxi & Giao thông",emoji:"🚖",color:"from-yellow-400 to-orange-500",tips:"Gọi taxi → Nói địa chỉ → Thanh toán",phrases:[{chinese:"我要去...",pinyin:"Wǒ yào qù...",vi:"Tôi muốn đến..."},{chinese:"请打表。",pinyin:"Qǐng dǎbiǎo.",vi:"Vui lòng bật đồng hồ."},{chinese:"在这里停。",pinyin:"Zài zhèlǐ tíng.",vi:"Dừng ở đây."}]},{id:9,title:"Khẩn cấp",emoji:"🚨",color:"from-red-400 to-rose-600",tips:"Gọi cứu trợ → Giải thích tình huống",phrases:[{chinese:"救命！",pinyin:"Jiùmìng!",vi:"Cứu tôi!"},{chinese:"我需要医生。",pinyin:"Wǒ xūyào yīshēng.",vi:"Tôi cần bác sĩ."},{chinese:"医院在哪里？",pinyin:"Yīyuàn zài nǎlǐ?",vi:"Bệnh viện ở đâu?"}]},{id:10,title:"Bác sĩ & Sức khỏe",emoji:"👨‍⚕️",color:"from-teal-400 to-cyan-500",tips:"Mô tả triệu chứng → Nhận đơn thuốc",phrases:[{chinese:"我不舒服。",pinyin:"Wǒ bù shūfu.",vi:"Tôi không khỏe."},{chinese:"我头疼。",pinyin:"Wǒ tóuténg.",vi:"Tôi bị đau đầu."}]},{id:11,title:"Ngân hàng & Tiền",emoji:"💰",color:"from-emerald-400 to-green-500",tips:"Đổi tiền → Rút tiền → Hỏi tỷ giá",phrases:[{chinese:"哪里可以换钱？",pinyin:"Nǎlǐ kěyǐ huànqián?",vi:"Có thể đổi tiền ở đâu?"},{chinese:"汇率是多少？",pinyin:"Huìlǜ shì duōshao?",vi:"Tỷ giá là bao nhiêu?"}]},{id:12,title:"Thời tiết",emoji:"🌤️",color:"from-blue-300 to-sky-500",tips:"Chủ đề phá băng tuyệt vời!",phrases:[{chinese:"今天天气怎么样？",pinyin:"Jīntiān tiānqì zěnmeyàng?",vi:"Hôm nay thời tiết thế nào?"},{chinese:"今天很热。",pinyin:"Jīntiān hěn rè.",vi:"Hôm nay rất nóng."}]},{id:13,title:"Công việc & Học tập",emoji:"💼",color:"from-slate-400 to-gray-600",tips:"Giới thiệu công việc → Hỏi về học tập",phrases:[{chinese:"你做什么工作？",pinyin:"Nǐ zuò shénme gōngzuò?",vi:"Bạn làm nghề gì?"},{chinese:"我是学生。",pinyin:"Wǒ shì xuésheng.",vi:"Tôi là sinh viên."}]},{id:14,title:"Sở thích & Giải trí",emoji:"🎮",color:"from-violet-400 to-purple-500",tips:"Hỏi sở thích → Chia sẻ → Mời cùng làm",phrases:[{chinese:"你喜欢做什么？",pinyin:"Nǐ xǐhuan zuò shénme?",vi:"Bạn thích làm gì?"},{chinese:"我喜欢看书。",pinyin:"Wǒ xǐhuan kànshū.",vi:"Tôi thích đọc sách."}]},{id:15,title:"Chia tay",emoji:"👋",color:"from-pink-300 to-rose-400",tips:"Thông báo rời đi → Chúc tốt → Tạm biệt",phrases:[{chinese:"我要走了。",pinyin:"Wǒ yào zǒu le.",vi:"Tôi phải đi rồi."},{chinese:"再见！",pinyin:"Zàijiàn!",vi:"Tạm biệt!"}]},{id:16,title:"Gia đình",emoji:"👨‍👩‍👧‍👦",color:"from-rose-400 to-pink-500",tips:"Giới thiệu thành viên gia đình",phrases:[{chinese:"这是我爸爸。",pinyin:"Zhè shì wǒ bàba.",vi:"Đây là bố tôi."},{chinese:"你有几个兄弟姐妹？",pinyin:"Nǐ yǒu jǐ gè xiōngdì jiěmèi?",vi:"Bạn có mấy anh chị em?"},{chinese:"我有一个妹妹。",pinyin:"Wǒ yǒu yī gè mèimei.",vi:"Tôi có một em gái."}]},{id:17,title:"Thời gian & Ngày tháng",emoji:"📅",color:"from-cyan-400 to-blue-500",tips:"Hỏi giờ → Nói ngày tháng → Hẹn gặp",phrases:[{chinese:"现在几点？",pinyin:"Xiànzài jǐ diǎn?",vi:"Bây giờ mấy giờ?"},{chinese:"今天星期几？",pinyin:"Jīntiān xīngqī jǐ?",vi:"Hôm nay thứ mấy?"},{chinese:"明天见！",pinyin:"Míngtiān jiàn!",vi:"Gặp lại ngày mai!"}]},{id:18,title:"Số & Giá cả",emoji:"🔢",color:"from-amber-400 to-yellow-500",tips:"Đếm số → Hỏi giá → Trả giá",phrases:[{chinese:"一、二、三、四、五",pinyin:"Yī, èr, sān, sì, wǔ",vi:"Một, hai, ba, bốn, năm"},{chinese:"便宜点吧！",pinyin:"Piányi diǎn ba!",vi:"Rẻ hơn đi!"},{chinese:"太多了。",pinyin:"Tài duō le.",vi:"Quá nhiều rồi."}]},{id:19,title:"Điện thoại & Internet",emoji:"📱",color:"from-purple-400 to-indigo-500",tips:"Hỏi WiFi → Gọi điện → Nhắn tin",phrases:[{chinese:"有WiFi吗？",pinyin:"Yǒu WiFi ma?",vi:"Có WiFi không?"},{chinese:"我可以用手机吗？",pinyin:"Wǒ kěyǐ yòng shǒujī ma?",vi:"Tôi có thể dùng điện thoại không?"},{chinese:"信号不好。",pinyin:"Xìnhào bù hǎo.",vi:"Tín hiệu không tốt."}]},{id:20,title:"Khen ngợi & Phàn nàn",emoji:"😊😔",color:"from-lime-400 to-green-500",tips:"Khen khi hài lòng → Phàn nàn lịch sự khi không hài lòng",phrases:[{chinese:"很好！",pinyin:"Hěn hǎo!",vi:"Rất tốt!"},{chinese:"太棒了！",pinyin:"Tài bàng le!",vi:"Tuyệt vời quá!"},{chinese:"不太好。",pinyin:"Bù tài hǎo.",vi:"Không được tốt lắm."}]}];const totalPhrases=topics.reduce((sum,topic)=>sum+topic.phrases.length,0);return(<div className="max-w-7xl mx-auto"><div className="text-center mb-6"><h1 className="text-3xl md:text-4xl font-bold bg-gradient-to-r from-red-600 via-orange-600 to-yellow-600 bg-clip-text text-transparent mb-2">🇨🇳 20 Chủ Đề - {totalPhrases} Mẫu Câu Giao Tiếp</h1><p className="text-gray-600">Học giao tiếp tiếng Trung qua tình huống thực tế!</p></div>{!selectedTopic?(<div><div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 mb-6">{topics.map((topic)=>(<button key={topic.id}onClick={()=>setSelectedTopic(topic)}className={`bg-gradient-to-br ${topic.color} text-white rounded-xl p-4 shadow-lg hover:shadow-xl transform hover:scale-105 transition-all`}><div className="text-4xl mb-2">{topic.emoji}</div><div className="text-sm font-semibold text-center leading-tight">{topic.title}</div></button>))}</div><div className="bg-white rounded-xl shadow-lg p-6"><div className="grid grid-cols-3 gap-4 text-center"><div><div className="text-3xl font-bold text-red-600">{topics.length}</div><div className="text-gray-600 text-sm">Chủ đề</div></div><div><div className="text-3xl font-bold text-orange-600">{totalPhrases}</div><div className="text-gray-600 text-sm">Mẫu câu</div></div><div><div className="text-3xl font-bold text-yellow-600">100%</div><div className="text-gray-600 text-sm">Thực tế</div></div></div></div></div>):(<div className="fade-in"><button onClick={()=>setSelectedTopic(null)}className="mb-4 px-4 py-2 bg-white rounded-lg shadow-md hover:shadow-lg transition-all flex items-center gap-2">← Quay lại</button><div className={`bg-gradient-to-r ${selectedTopic.color} text-white rounded-2xl p-6 mb-6 shadow-xl`}><div className="flex items-center gap-4 mb-4"><div className="text-5xl">{selectedTopic.emoji}</div><div><h2 className="text-2xl font-bold">{selectedTopic.title}</h2><p className="text-white/90 text-sm">{selectedTopic.phrases.length} mẫu câu</p></div></div><button onClick={()=>setShowTips(!showTips)}className="bg-white/20 hover:bg-white/30 backdrop-blur-sm rounded-lg px-4 py-2 text-sm font-medium transition-all">{showTips?'🔽':'▶️'} Mẹo giao tiếp</button>{showTips&&(<div className="mt-3 bg-white/20 backdrop-blur-sm rounded-lg p-4"><div className="flex items-start gap-2"><span className="text-xl">💡</span><p className="text-white/95 text-sm leading-relaxed"><strong>Thứ tự giao tiếp:</strong> {selectedTopic.tips}</p></div></div>)}</div><div className="bg-white rounded-2xl shadow-xl p-6"><div className="space-y-3">{selectedTopic.phrases.map((phrase,index)=>(<div key={index}className="flex items-start gap-4 p-4 bg-gradient-to-r from-gray-50 to-orange-50 rounded-xl hover:from-orange-50 hover:to-red-50 transition-all"><div className="flex-shrink-0 w-8 h-8 bg-gradient-to-r from-red-500 to-orange-600 text-white rounded-full flex items-center justify-center font-bold text-sm">{index+1}</div><div className="flex-1"><div className="text-2xl font-bold text-gray-800 mb-1">{phrase.chinese}</div><div className="text-blue-600 font-medium mb-1">{phrase.pinyin}</div><div className="text-gray-600 text-sm">{phrase.vi}</div></div></div>))}</div></div><div className="mt-6 bg-gradient-to-r from-amber-100 to-orange-100 rounded-xl p-4 border-l-4 border-orange-500"><div className="flex items-start gap-3"><span className="text-2xl">🎯</span><div><h3 className="font-bold text-gray-800 mb-1">Lời khuyên:</h3><p className="text-gray-700 text-sm leading-relaxed">Thực hành các câu theo thứ tự từ trên xuống dưới. Học 3-5 câu/ngày và áp dụng vào tình huống thực tế. Đừng cố học thuộc lòng tất cả, hãy hiểu và tự nhiên sử dụng!</p></div></div></div></div>)}</div>);};ReactDOM.render(<App/>,document.getElementById('app'));
    </script>
</body>
</html>
