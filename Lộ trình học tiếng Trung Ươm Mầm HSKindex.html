<body class="bg-gradient-to-br from-red-50 via-orange-50 to-yellow-50 min-h-screen p-4">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
const{useState,useEffect}=React;const RoadmapApp=()=>{const[selectedPhase,setSelectedPhase]=useState(null);const[completedSteps,setCompletedSteps]=useState([]);const[studyDays,setStudyDays]=useState(0);const[showMotivation,setShowMotivation]=useState(false);useEffect(()=>{const saved=localStorage.getItem('uommamProgress');if(saved){const data=JSON.parse(saved);setCompletedSteps(data.completed||[]);setStudyDays(data.days||0);}},[]);const saveProgress=(completed,days)=>{localStorage.setItem('uommamProgress',JSON.stringify({completed,days}));};const toggleStep=(stepId)=>{const newCompleted=completedSteps.includes(stepId)?completedSteps.filter(id=>id!==stepId):[...completedSteps,stepId];setCompletedSteps(newCompleted);saveProgress(newCompleted,studyDays);};const addStudyDay=()=>{const newDays=studyDays+1;setStudyDays(newDays);saveProgress(completedSteps,newDays);};const roadmap=[{id:1,phase:"Tháng 1",title:"HSK1 - Nền Tảng Cơ Bản",icon:"🌱",color:"from-blue-400 to-cyan-500",duration:"30 ngày",level:"Sơ cấp",target:"150 từ vựng + 150 chữ Hán",steps:[{id:"1-1",title:"Tuần 1: Phát âm Pinyin (21 thanh mẫu + 36 vận mẫu)",description:"Học chuẩn phát âm từ đầu. Mỗi ngày 30 phút luyện thanh mẫu/vận mẫu với giáo viên.",concrete:"✅ Ngày 1-2: Học 6 thanh mẫu: b, p, m, f, d, t\n✅ Ngày 3-4: Học 6 vận mẫu: a, o, e, i, u, ü\n✅ Ngày 5-7: Luyện kết hợp + 4 thanh điệu. Ghi âm giọng mình, giáo viên chữa.",tips:"📌 Công cụ: App Pleco để tra âm. Ghi âm 10 từ mỗi ngày và gửi giáo viên check."},{id:"1-2",title:"Tuần 2-3: 150 từ vựng HSK1 + Viết chữ Hán cơ bản",description:"Học theo giáo trình HSK Standard 1. Mỗi ngày học 7-8 từ mới.",concrete:"✅ Sáng: Học từ mới với flashcard (Quizlet/Anki set 'Ươm Mầm HSK1')\n✅ Chiều: Xem video bài giảng Ươm Mầm (15 phút)\n✅ Tối: Luyện viết 20 chữ Hán, chú ý bút thuận\n✅ Mục tiêu: 7 từ/ngày × 14 ngày = 98 từ (tuần 2-3)",tips:"📌 Tải bộ flashcard 'Ươm Mầm HSK1' tại Google Drive của trung tâm. Viết chữ Hán trên app Skritter hoặc vở ô li."},{id:"1-3",title:"Tuần 4: Ôn tập + Thi thử HSK1",description:"Ôn lại toàn bộ 150 từ. Làm 3 đề thi thử HSK1.",concrete:"✅ Ngày 22-24: Ôn lại 150 từ với flashcard (3 lần/từ)\n✅ Ngày 25-27: Làm 3 đề thi thử HSK1 (file PDF từ Ươm Mầm)\n✅ Ngày 28-30: Giáo viên chữa bài, focus vào lỗi sai\n✅ Mục tiêu: Đạt 70%+ điểm thi thử",tips:"📌 Đề thi thử tải tại: drive.google.com/uommam-hsk1. Làm bài trong thời gian chuẩn (35 phút)."},{id:"1-4",title:"Ngữ pháp HSK1: 6 cấu trúc cơ bản",description:"Học 6 mẫu câu quan trọng nhất HSK1",concrete:"1️⃣ 我是... (Wǒ shì...) - Tôi là...\n2️⃣ 这是... (Zhè shì...) - Đây là...\n3️⃣ 我有... (Wǒ yǒu...) - Tôi có...\n4️⃣ 我想... (Wǒ xiǎng...) - Tôi muốn...\n5️⃣ 在...里/上/下 (zài...lǐ/shàng/xià) - Ở trong/trên/dưới...\n6️⃣ 不... (bù...) - Không...",tips:"📌 Mỗi cấu trúc làm 10 câu ví dụ. Gửi giáo viên check qua Zalo/Email."}]},{id:2,phase:"Tháng 2-3",title:"HSK2 - Phát Triển Giao Tiếp",icon:"🌿",color:"from-green-400 to-emerald-500",duration:"60 ngày",level:"Sơ cấp",target:"300 từ vựng + 300 chữ Hán",steps:[{id:"2-1",title:"Tuần 1-4: 300 từ vựng HSK2",description:"Học HSK2 Standard. Tốc độ 8 từ/ngày.",concrete:"✅ Sáng: Học 8 từ mới từ Quizlet 'Ươm Mầm HSK2'\n✅ Trưa: Nghe audio từ vựng 2 lần (file MP3 từ trung tâm)\n✅ Chiều: Làm bài tập sách HSK2 Standard (1 bài/ngày)\n✅ Tối: Ôn lại 16 từ cũ (hôm qua + hôm kia)\n✅ Cuối tuần: Ôn lại 56 từ đã học trong tuần",tips:"📌 Link Quizlet: quizlet.com/uommam-hsk2. Tải audio MP3 tại drive của trung tâm."},{id:"2-2",title:"Tuần 5-6: Luyện nghe HSK2",description:"Luyện nghe 30 phút/ngày với bài tập HSK2",concrete:"✅ Ngày 1-3: Nghe Part 1 (Chọn tranh đúng) - 10 câu/ngày\n✅ Ngày 4-6: Nghe Part 2 (Đúng/Sai) - 10 câu/ngày\n✅ Ngày 7-10: Nghe Part 3 (Chọn đáp án) - 10 câu/ngày\n✅ Ngày 11-14: Làm đề thi thử nghe hoàn chỉnh (35 phút)",tips:"📌 File audio + đề thi thử: drive.google.com/uommam-hsk2-listening"},{id:"2-3",title:"Tuần 7-8: Luyện nói với giáo viên 1-1",description:"8 buổi luyện nói 1-1 với giáo viên (mỗi buổi 30 phút)",concrete:"🗣️ Buổi 1-2: Tự giới thiệu + Gia đình (我叫...，我家有...)\n🗣️ Buổi 3-4: Mua sắm + Hỏi giá (多少钱？太贵了！)\n🗣️ Buổi 5-6: Nhà hàng + Gọi món (我要...，不要辣)\n🗣️ Buổi 7-8: Hỏi đường + Di chuyển (怎么去...？在哪里？)\n✅ Giáo viên ghi âm, học viên nghe lại và tự sửa",tips:"📌 Đặt lịch học 1-1 với trợ lý Ươm Mầm qua Zalo/Hotline."},{id:"2-4",title:"Tuần 9: Thi thử HSK2 đầy đủ",description:"Làm 5 đề thi thử HSK2 hoàn chỉnh",concrete:"✅ Ngày 1-5: Mỗi ngày 1 đề thi thử (60 phút/đề)\n- Part 1: Nghe (25 phút)\n- Part 2: Đọc (22 phút)\n✅ Ngày 6-7: Giáo viên chữa bài chi tiết, giải thích từng lỗi\n✅ Mục tiêu: Đạt 80%+ điểm (chuẩn bị thi thật)",tips:"📌 5 đề thi thử chuẩn format: drive.google.com/uommam-hsk2-mock"}]},{id:3,phase:"Tháng 4-6",title:"HSK3 - Trung Cấp Sơ Cấp",icon:"🌳",color:"from-purple-400 to-pink-500",duration:"90 ngày",level:"Trung cấp",target:"600 từ vựng + 600 chữ Hán",steps:[{id:"3-1",title:"Tuần 1-8: 600 từ vựng HSK3",description:"Học theo HSK3 Standard. Tốc độ 10 từ/ngày.",concrete:"✅ Sáng: Học 10 từ mới từ Anki deck 'Ươm Mầm HSK3'\n✅ Trưa: Đọc 1 bài đọc ngắn HSK3 (5 phút)\n✅ Chiều: Xem video bài giảng Ươm Mầm (20 phút)\n✅ Tối: Làm bài tập SGK HSK3 Standard (2 bài/ngày)\n✅ Mỗi 7 ngày: Test 70 từ đã học (tự làm hoặc với giáo viên)",tips:"📌 Anki deck: ankiweb.net/shared/uommam-hsk3. Bài đọc ngắn trong file PDF bài tập."},{id:"3-2",title:"Tuần 9-10: Ngữ pháp HSK3 nâng cao",description:"15 cấu trúc ngữ pháp quan trọng HSK3",concrete:"1️⃣ 除了...以外 (chúle...yǐwài) - Ngoài...ra\n2️⃣ 不但...而且 (búdàn...érqiě) - Không những...mà còn\n3️⃣ 因为...所以 (yīnwèi...suǒyǐ) - Vì...nên\n4️⃣ 虽然...但是 (suīrán...dànshì) - Mặc dù...nhưng\n5️⃣ 又...又... (yòu...yòu...) - Vừa...vừa...\n...+ 10 cấu trúc khác (file PDF đầy đủ từ trung tâm)",tips:"📌 Mỗi cấu trúc: Học lý thuyết 10 phút → Làm 15 câu bài tập → Tạo 5 câu riêng"},{id:"3-3",title:"Tuần 11-12: Luyện thi HSK3 chuyên sâu",description:"12 buổi luyện đề với giáo viên (90 phút/buổi)",concrete:"📝 Buổi 1-4: Luyện Nghe (40 câu, 35 phút)\n- Phân tích chiến thuật nghe\n- Học từ vựng theo chủ đề (gia đình, công việc, du lịch...)\n\n📖 Buổi 5-8: Luyện Đọc (30 câu, 30 phút)\n- Kỹ thuật đọc lướt (skimming)\n- Kỹ thuật đọc chi tiết (scanning)\n\n✍️ Buổi 9-12: Luyện Viết (10 câu, 15 phút)\n- Sắp xếp từ thành câu\n- Chiến lược làm bài nhanh",tips:"📌 Đặt lịch học theo lịch cá nhân. Mỗi tuần 3 buổi × 4 tuần."},{id:"3-4",title:"Tuần 13: Thi thử + Đánh giá cuối khóa",description:"Thi thử chính thức tại Ươm Mầm + Nhận phản hồi chi tiết",concrete:"✅ Ngày 1: Thi thử HSK3 đầy đủ tại trung tâm (phòng thi chuẩn)\n✅ Ngày 2-3: Giáo viên chấm bài + phân tích điểm yếu\n✅ Ngày 4-5: Ôn luyện tập trung vào phần yếu\n✅ Ngày 6-7: Thi thử lần 2 (để xác nhận tiến bộ)\n✅ Mục tiêu: Đạt 85%+ điểm → Sẵn sàng thi chính thức",tips:"📌 Sau khóa, trung tâm hỗ trợ đăng ký thi chính thức HSK3 tại địa điểm gần nhất."}]},{id:4,phase:"Tháng 7-10",title:"HSK4 - Trung Cấp",icon:"🌲",color:"from-orange-400 to-red-500",duration:"120 ngày",level:"Trung cấp",target:"1200 từ vựng + Giao tiếp thành thạo",steps:[{id:"4-1",title:"Tháng 7-8: 1200 từ vựng HSK4 + Ngữ pháp",description:"Học 12 từ/ngày. Học ngữ pháp song song.",concrete:"✅ Tuần 1-4: Học 84 từ/tuần (12 từ/ngày × 7 ngày)\n✅ Tuần 5-8: Tiếp tục 84 từ/tuần + Ôn lại 168 từ đã học\n✅ Mỗi tuần: 1 buổi học ngữ pháp 2 tiếng với giáo viên\n✅ 20 cấu trúc ngữ pháp HSK4 (mỗi tuần 5 cấu trúc)\n✅ Cuối tháng: Test tổng hợp 336 từ",tips:"📌 Quizlet: quizlet.com/uommam-hsk4. File ngữ pháp: drive.google.com/uommam-hsk4-grammar"},{id:"4-2",title:"Tháng 9: Luyện 4 kỹ năng chuyên sâu",description:"Nghe-Nói-Đọc-Viết mỗi kỹ năng 1 tuần",concrete:"🎧 Tuần 1: NGHE (7 ngày × 1 giờ)\n- Nghe podcast tiếng Trung sơ cấp (ChinesePod Newbie)\n- Làm 50 câu luyện nghe HSK4\n\n🗣️ Tuần 2: NÓI (7 ngày × 1 giờ)\n- 7 buổi nói 1-1 với giáo viên (mỗi buổi 45 phút)\n- Chủ đề: Công việc, Du lịch, Sở thích, Kế hoạch tương lai\n\n📖 Tuần 3: ĐỌC (7 ngày × 1 giờ)\n- Đọc 10 bài đọc HSK4\n- Học từ vựng theo context\n\n✍️ Tuần 4: VIẾT (7 ngày × 1 giờ)\n- Viết 14 đoạn văn ngắn (80-100 chữ)\n- Giáo viên chữa + feedback chi tiết",tips:"📌 Tài liệu luyện đầy đủ: drive.google.com/uommam-hsk4-skills"},{id:"4-3",title:"Tháng 10: Luyện đề thi + Thi thử",description:"Làm 15 đề thi thử HSK4. Mỗi tuần 4 đề.",concrete:"✅ Tuần 1: 4 đề thi thử (Thứ 2, 4, 6, 7)\n- Làm đề → Chữa bài → Phân tích lỗi → Ôn lại\n\n✅ Tuần 2: 4 đề thi thử + Học từ sai\n- Tạo flashcard riêng cho từ làm sai\n- Ôn lại ngữ pháp yếu\n\n✅ Tuần 3: 4 đề thi thử + Tăng tốc độ làm bài\n- Rút thời gian làm bài: 100 phút → 90 phút → 85 phút\n\n✅ Tuần 4: 3 đề thi thử chính thức tại trung tâm\n- Thi trong điều kiện thi thật\n- Mục tiêu: 90%+ điểm",tips:"📌 15 đề thi chuẩn format: drive.google.com/uommam-hsk4-15tests"}]},{id:5,phase:"Tháng 11-16",title:"HSK5 - Trung Cấp Cao",icon:"🏔️",color:"from-indigo-400 to-purple-500",duration:"180 ngày",level:"Trung-cao cấp",target:"2500 từ vựng + Đọc-Viết thành thạo",steps:[{id:"5-1",title:"Tháng 11-13: 2500 từ vựng HSK5",description:"Giai đoạn tích lũy từ vựng nặng nhất. 15 từ/ngày.",concrete:"✅ Mỗi ngày: 15 từ mới (Anki 'Ươm Mầm HSK5')\n✅ Mỗi tuần: Ôn lại 105 từ mới + 200 từ cũ\n✅ Mỗi tháng: Test 450 từ đã học\n✅ Tháng 11: 450 từ (tổng: 450)\n✅ Tháng 12: 450 từ (tổng: 900)\n✅ Tháng 1: 450 từ (tổng: 1350 - gần xong HSK5)\n✅ Song song: Học 30 cấu trúc ngữ pháp HSK5 (10/tháng)",tips:"📌 Anki: ankiweb.net/uommam-hsk5. Ngữ pháp: drive.google.com/uommam-hsk5-grammar"},{id:"5-2",title:"Tháng 14-15: Luyện Đọc + Viết chuyên sâu",description:"Đọc hiểu bài dài + Viết luận 80 chữ",concrete:"📖 LUYỆN ĐỌC (60 ngày):\n✅ Tuần 1-4: Đọc 28 bài HSK5 (1 bài/ngày)\n- Phân tích cấu trúc bài\n- Tóm tắt nội dung chính\n- Học từ vựng trong context\n\n✍️ LUYỆN VIẾT (60 ngày):\n✅ Tuần 1-2: Viết 14 đoạn miêu tả (80 chữ)\n✅ Tuần 3-4: Viết 14 đoạn so sánh (80 chữ)\n✅ Tuần 5-6: Viết 14 đoạn nghị luận (80 chữ)\n✅ Tuần 7-8: Viết 14 đoạn tự do + giáo viên chữa\n\n✅ Mỗi bài viết: Giáo viên chữa + score + feedback cụ thể",tips:"📌 Bài đọc mẫu: drive.google.com/uommam-hsk5-reading. Template viết: drive.google.com/uommam-hsk5-writing"},{id:"5-3",title:"Tháng 16: Luyện thi HSK5 tổng hợp",description:"20 đề thi thử HSK5. Luyện chiến thuật thi.",concrete:"✅ Tuần 1: 5 đề thi thử - Làm quen format\n- Phân tích cấu trúc đề thi\n- Học chiến thuật làm bài nhanh\n\n✅ Tuần 2: 5 đề thi thử - Rèn tốc độ\n- Nghe: 45 câu trong 30 phút\n- Đọc: 45 câu trong 40 phút\n- Viết: 10 câu trong 40 phút\n\n✅ Tuần 3: 5 đề thi thử - Tăng độ chính xác\n- Focus vào các câu hay sai\n- Ôn lại ngữ pháp khó\n\n✅ Tuần 4: 5 đề thi thử chính thức tại trung tâm\n- Thi như thi thật (phòng riêng, giám thị)\n- Mục tiêu: 280+ điểm (đạt chuẩn tốt nghiệp)",tips:"📌 20 đề thi chuẩn: drive.google.com/uommam-hsk5-20tests. Chiến thuật thi: Tài liệu riêng của trung tâm."}]},{id:6,phase:"Sau HSK5",title:"Nâng Cao & Ứng Dụng",icon:"🎓",color:"from-yellow-400 to-amber-500",duration:"Liên tục",level:"Cao cấp",target:"Giao tiếp tự do + Làm việc bằng tiếng Trung",steps:[{id:"6-1",title:"HSK6 (Tùy chọn) - Trình độ gần người bản xứ",description:"5000 từ vựng + Đọc báo + Viết luận chuyên nghiệp",concrete:"📚 HSK6 yêu cầu:\n- 5000 từ vựng (thêm 2500 từ nữa)\n- Đọc hiểu bài dài 1000+ chữ\n- Viết luận 400 chữ\n- Nghe hiểu nội dung phức tạp\n\n✅ Lộ trình: 6-12 tháng\n✅ Phù hợp: Người cần làm việc môi trường TQ, du học, dịch thuật",tips:"📌 Liên hệ Ươm Mầm để tư vấn lộ trình HSK6 chi tiết"},{id:"6-2",title:"Luyện giao tiếp thực tế",description:"Tham gia câu lạc bộ tiếng Trung, xem phim, đọc sách",concrete:"🗣️ CLB Tiếng Trung Ươm Mầm:\n- Gặp mặt mỗi tuần (offline/online)\n- Chủ đề: Văn hóa, Du lịch, Ẩm thực, Kinh doanh\n- Có giáo viên người TQ tham gia\n\n📺 Xem phim/show TQ:\n- 家有儿女 (Gia Hữu Nhi Nữ)\n- 奔跑吧兄弟 (Keep Running)\n- 中国好声音 (The Voice of China)\n\n📖 Đọc sách tiếng Trung:\n- 活着 (Sống) - Dư Hoa\n- 平凡的世界 (Thế Giới Bình Thường)\n- Báo: 人民日报, 环球时报",tips:"📌 Link group Facebook CLB: facebook.com/groups/uommam-chinese-club"}]},{id:7,phase:"Hỗ Trợ Liên Tục",title:"Dịch Vụ Hỗ Trợ Học Viên",icon:"🤝",color:"from-teal-400 to-cyan-500",duration:"Trọn đời",level:"Tất cả cấp độ",target:"Đồng hành cùng học viên",steps:[{id:"7-1",title:"Group học tập + Giáo viên trực tuyến",description:"Hỏi đáp 24/7 qua Zalo/Facebook Group",concrete:"💬 Zalo Group 'Học Viên Ươm Mầm HSK':\n- Hơn 500 học viên đang học\n- Giáo viên trực 8h-22h hàng ngày\n- Chia sẻ tài liệu, tips học tập\n\n📱 Facebook Group 'Ươm Mầm HSK Community':\n- Chia sẻ kinh nghiệm thi\n- Kết nối học viên cùng level\n- Livestream ôn tập định kỳ",tips:"📌 Link tham gia group gửi sau khi đăng ký khóa học"},{id:"7-2",title:"Thư viện tài liệu số",description:"Truy cập miễn phí 1000+ tài liệu học",concrete:"📚 Google Drive 'Ươm Mầm HSK':\n- 1000+ file PDF bài tập, đề thi\n- 500+ file audio/video bài giảng\n- Flashcard Anki/Quizlet cho HSK1-6\n- Template viết luận, ghi chú\n\n✅ Cập nhật liên tục mỗi tháng\n✅ Tải xuống không giới hạn\n✅ Truy cập trọn đời",tips:"📌 Link Drive gửi qua email sau khi đăng ký"},{id:"7-3",title:"Tư vấn lộ trình cá nhân hóa",description:"Gặp cố vấn học tập 1-1 định kỳ",concrete:"👨‍🏫 Dịch vụ tư vấn:\n✅ Tháng 1: Đánh giá đầu vào + Lập lộ trình cá nhân\n✅ Mỗi 3 tháng: Họp 1-1 review tiến độ (30 phút)\n✅ Bất cứ lúc nào: Đặt lịch tư vấn riêng qua hotline\n✅ Điều chỉnh lộ trình phù hợp tốc độ học\n\n📊 Theo dõi:\n- Điểm test định kỳ\n- Tỉ lệ hoàn thành bài tập\n- Phân tích điểm mạnh/yếu",tips:"📌 Hotline tư vấn: 0123.456.789 (8h-20h hằng ngày)"},{id:"7-4",title:"Hỗ trợ đăng ký thi chính thức",description:"Trung tâm hỗ trợ đăng ký + Hướng dẫn thi",concrete:"📝 Hỗ trợ đăng ký thi HSK:\n✅ Tư vấn địa điểm thi gần nhất\n✅ Hướng dẫn đăng ký online trên chinesetest.cn\n✅ Hướng dẫn chuẩn bị giấy tờ (CMND, ảnh...)\n✅ Nhắc lịch thi, checklist chuẩn bị\n\n🎯 Ngày thi:\n✅ Chia sẻ tips làm bài de-stress\n✅ Group ôn tập cấp tốc trước thi 1 tuần\n✅ Giáo viên động viên qua Zalo",tips:"📌 Kỳ thi HSK tổ chức 2 lần/năm (tháng 5 và tháng 11). Đăng ký trước 1 tháng."}]}];const totalSteps=roadmap.reduce((sum,phase)=>sum+phase.steps.length,0);const progress=Math.round((completedSteps.length/totalSteps)*100);const motivationQuotes=["💪 Ươm Mầm HSK đồng hành cùng bạn từ Zero đến thành thạo!","🎯 Học đều đặn mỗi ngày, kiên trì là chìa khóa thành công!","🌟 Hơn 2000 học viên đã đạt HSK5 với Ươm Mầm!","🚀 Lộ trình rõ ràng, giáo viên tận tâm, đảm bảo đầu ra!","📚 Mỗi bước nhỏ đều được theo dõi và hỗ trợ!"];const tools=[{name:"Quizlet/Anki",icon:"📱",desc:"Bộ flashcard HSK1-6 do Ươm Mầm biên soạn. Link trong Google Drive."},{name:"Google Drive",icon:"📊",desc:"1000+ tài liệu, đề thi, audio, video. Truy cập trọn đời."},{name:"Zalo Group",icon:"💬",desc:"Group học viên 500+ thành viên. Giáo viên trực 8h-22h."},{name:"Buổi học 1-1",icon:"👨‍🏫",desc:"Luyện nói, chữa bài cá nhân hóa với giáo viên."},{name:"Thi thử tại TT",icon:"🎯",desc:"Phòng thi chuẩn, giám thị, điều kiện như thi thật."}];return(<div className="max-w-7xl mx-auto"><div className="text-center mb-8"><div className="float-animation inline-block text-6xl mb-4">🎓</div><h1 className="text-4xl md:text-5xl font-bold bg-gradient-to-r from-red-600 via-orange-600 to-yellow-600 bg-clip-text text-transparent mb-3">Lộ Trình Học Tiếng Trung từ 0 đến HSK</h1><p className="text-2xl font-bold text-gray-800 mb-2">🌱 Trung Tâm Ươm Mầm HSK</p><p className="text-gray-600">Lộ trình chi tiết, cụ thể từng ngày - Đảm bảo đầu ra HSK5</p></div><div className="bg-white rounded-2xl shadow-xl p-6 mb-8"><div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-4"><div><h3 className="text-2xl font-bold text-gray-800 mb-1">📊 Tiến Độ Của Bạn</h3><p className="text-gray-600">Đánh dấu các bước đã hoàn thành!</p></div><div className="flex gap-4"><div className="text-center"><div className="text-3xl font-bold text-blue-600">{completedSteps.length}/{totalSteps}</div><div className="text-sm text-gray-600">Bước hoàn thành</div></div><div className="text-center"><div className="text-3xl font-bold text-green-600">{studyDays}</div><div className="text-sm text-gray-600">Ngày học</div></div><button onClick={addStudyDay}className="px-4 py-2 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-lg font-bold hover:shadow-lg transition-all">+1 Ngày</button></div></div><div className="w-full bg-gray-200 rounded-full h-4 mb-2"><div className="bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 h-4 rounded-full transition-all duration-500"style={{width:`${progress}%`}}></div></div><div className="text-right text-sm font-bold text-gray-700">{progress}% hoàn thành</div></div><div className="bg-gradient-to-r from-yellow-100 to-orange-100 rounded-xl p-6 mb-8 border-l-4 border-orange-500 shadow-lg"><button onClick={()=>setShowMotivation(!showMotivation)}className="w-full flex items-center justify-between"><div className="flex items-center gap-3"><span className="text-3xl">🔥</span><h3 className="text-xl font-bold text-gray-800">Động Lực Từ Ươm Mầm</h3></div><span className="text-2xl">{showMotivation?'🔽':'▶️'}</span></button>{showMotivation&&(<div className="mt-4 space-y-2 fade-in">{motivationQuotes.map((quote,idx)=>(<div key={idx}className="bg-white/50 rounded-lg p-3 text-gray-700 font-medium">{quote}</div>))}</div>)}</div>{!selectedPhase?(<div className="space-y-6">{roadmap.map((phase)=>{const phaseCompleted=phase.steps.filter(s=>completedSteps.includes(s.id)).length;const phaseProgress=Math.round((phaseCompleted/phase.steps.length)*100);return(<div key={phase.id}onClick={()=>setSelectedPhase(phase)}className={`bg-gradient-to-br ${phase.color} rounded-2xl p-6 text-white shadow-xl hover:shadow-2xl transform hover:scale-105 transition-all cursor-pointer ${phaseProgress===100?'opacity-90':''}`}><div className="flex items-center justify-between mb-4"><div className="flex items-center gap-4"><div className="text-6xl">{phase.icon}</div><div><div className="text-sm opacity-90 font-medium">{phase.phase}</div><h3 className="text-2xl font-bold">{phase.title}</h3></div></div>{phaseProgress===100&&<div className="text-4xl">✅</div>}</div><div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4"><div className="bg-white/20 backdrop-blur-sm rounded-lg p-3"><div className="text-sm opacity-90">Thời gian:</div><div className="font-bold">{phase.duration}</div></div><div className="bg-white/20 backdrop-blur-sm rounded-lg p-3"><div className="text-sm opacity-90">Cấp độ:</div><div className="font-bold">{phase.level}</div></div><div className="bg-white/20 backdrop-blur-sm rounded-lg p-3"><div className="text-sm opacity-90">Mục tiêu:</div><div className="font-bold text-sm">{phase.target}</div></div></div><div className="w-full bg-white/20 rounded-full h-2 mb-3"><div className="bg-white h-2 rounded-full transition-all"style={{width:`${phaseProgress}%`}}></div></div><button className="w-full bg-white/20 hover:bg-white/30 backdrop-blur-sm rounded-lg py-2 font-bold transition-all">👁️ Xem chi tiết {phase.steps.length} bước →</button></div>);})}</div>):(<div className="fade-in"><button onClick={()=>setSelectedPhase(null)}className="mb-6 px-6 py-3 bg-white rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center gap-2 font-medium">← Quay lại tổng quan</button><div className={`bg-gradient-to-br ${selectedPhase.color} rounded-2xl p-8 text-white shadow-2xl mb-6`}><div className="flex items-center gap-4 mb-4"><div className="text-7xl">{selectedPhase.icon}</div><div><div className="text-lg opacity-90 font-medium">{selectedPhase.phase}</div><h2 className="text-4xl font-bold">{selectedPhase.title}</h2><div className="mt-2 opacity-90">{selectedPhase.duration} • {selectedPhase.level}</div><div className="mt-1 text-lg font-semibold">🎯 {selectedPhase.target}</div></div></div></div><div className="space-y-4">{selectedPhase.steps.map((step,idx)=>{const isCompleted=completedSteps.includes(step.id);return(<div key={step.id}className={`bg-white rounded-xl shadow-lg p-6 transition-all ${isCompleted?'completed':''}`}><div className="flex items-start gap-4"><button onClick={()=>toggleStep(step.id)}className={`flex-shrink-0 w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold transition-all ${isCompleted?'bg-green-500 border-green-500 text-white':'border-gray-300 hover:border-blue-500'}`}>{isCompleted?'✓':idx+1}</button><div className="flex-1"><h4 className="text-xl font-bold text-gray-800 mb-2">{step.title}</h4><p className="text-gray-700 mb-3">{step.description}</p><div className="bg-purple-50 rounded-lg p-4 mb-3 border-l-4 border-purple-500"><div className="font-bold text-purple-800 mb-2">📋 Kế hoạch cụ thể:</div><pre className="text-sm text-gray-700 whitespace-pre-wrap font-sans">{step.concrete}</pre></div><div className="bg-blue-50 rounded-lg p-3 border-l-4 border-blue-500"><div className="flex items-start gap-2"><span className="text-lg">💡</span><div className="text-sm text-gray-700"><strong>Tips:</strong> {step.tips}</div></div></div></div></div></div>);})}</div></div>)}{!selectedPhase&&(<div className="mt-8 bg-white rounded-2xl shadow-xl p-8"><h3 className="text-2xl font-bold text-gray-800 mb-6 text-center">🛠️ Công Cụ & Tài Nguyên</h3><div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">{tools.map((tool,idx)=>(<div key={idx}className="bg-gradient-to-br from-blue-50 to-purple-50 rounded-xl p-4 border-2 border-blue-200 hover:border-blue-400 transition-all"><div className="text-3xl mb-2">{tool.icon}</div><div className="font-bold text-gray-800 mb-1">{tool.name}</div><div className="text-sm text-gray-600">{tool.desc}</div></div>))}</div><div className="bg-gradient-to-r from-red-50 to-orange-50 rounded-xl p-6 border-l-4 border-red-500"><div className="flex items-start gap-3"><span className="text-3xl">📞</span><div><h4 className="font-bold text-gray-800 mb-2">Liên Hệ Trung Tâm Ươm Mầm HSK:</h4><div className="space-y-1 text-gray-700 text-sm"><div>☎️ <strong>Hotline:</strong> 0123.456.789 (8h-20h hằng ngày)</div><div>📧 <strong>Email:</strong> lienhe@uommamhsk.edu.vn</div><div>🏢 <strong>Địa chỉ:</strong> 123 Đường ABC, Quận XYZ, TP.HCM</div><div>🌐 <strong>Website:</strong> www.uommamhsk.edu.vn</div><div>📱 <strong>Facebook:</strong> fb.com/uommamhsk</div></div></div></div></div></div>)}{!selectedPhase&&(<div className="mt-8 bg-gradient-to-r from-green-100 to-emerald-100 rounded-2xl p-6 border-l-4 border-green-500 shadow-lg"><div className="flex items-start gap-4"><span className="text-4xl">🎓</span><div><h3 className="text-xl font-bold text-gray-800 mb-3">Cam Kết Của Ươm Mầm HSK:</h3><ul className="space-y-2 text-gray-700"><li>✅ <strong>Lộ trình rõ ràng:</strong> Biết chính xác học gì, khi nào, như thế nào</li><li>✅ <strong>Giáo viên tận tâm:</strong> Đội ngũ giáo viên người Việt + người TQ kinh nghiệm</li><li>✅ <strong>Theo dõi sát sao:</strong> Test định kỳ, review tiến độ, tư vấn cá nhân hóa</li><li>✅ <strong>Tài liệu đầy đủ:</strong> 1000+ file, cập nhật liên tục, truy cập trọn đời</li><li>✅ <strong>Đảm bảo đầu ra:</strong> Học lại MIỄN PHÍ nếu không đạt target</li></ul></div></div></div>)}</div>);};ReactDOM.render(<RoadmapApp/>,document.getElementById('app'));
